name: Build BaboscOS

on:
  push:
    branches:
      - workflow
  pull_request:
    branches:
      - workflow

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: "6.0.x"

      - name: Download Cosmos User Kit
        run: |
          curl -L -o CosmosUserKit-20221121-vs2022.exe https://github.com/CosmosOS/Cosmos/releases/download/UserKit_20221121/CosmosUserKit-20221121-vs2022.exe

      - name: Install Cosmos User Kit
        run: |
          ./CosmosUserKit-20221121-vs2022.exe /S

      - name: Install Visual Studio 2022 Community
        run: |
          choco install visualstudio2022community --package-parameters "--add Microsoft.VisualStudio.Workload.ManagedDesktop --add Microsoft.VisualStudio.Workload.NetCoreTools --includeRecommended --includeOptional"
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --includeOptional"

      - name: Restore NuGet packages
        run: dotnet restore BaboscOS/BaboscOS.csproj

      - name: Build BaboscOS
        run: dotnet build BaboscOS/BaboscOS.csproj --configuration Release

      - name: Publish BaboscOS
        run: dotnet publish BaboscOS/BaboscOS.csproj --configuration Release --output ./output

      - name: Upload build artifacts
        uses: actions/upload-artifact@v2
        with:
          name: BaboscOS
          path: ./output
